<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #121212; color: white; text-align: center; }
        .container { border: 1px solid #333; padding: 2rem; border-radius: 10px; background: #1e1e1e; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .accept { background-color: #2ecc71; color: white; }
        .decline { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ADULT CONTENT</h1>
        <p>This link is intended for users <strong>18 years or older</strong> only.</p>
        <p>Do you wish to proceed?</p>
        <button class="accept" onclick="window.location.href='https://x.com/naughty_gtig'">Accept</button>
        <button class="decline" onclick="alert('Access denied.'); window.history.back();">Decline</button>
    </div>
</body>
</html>
